<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wolf Points Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ee;
      --surface: #ffffff;
      --surface2: #f0ede6;
      --border: #d8d4ca;
      --border2: #c4bfb4;
      --text: #1a1916;
      --text2: #6b6760;
      --text3: #9b9890;
      --green: #2d6a4f;
      --green-bg: #d8f3dc;
      --green-border: #a7d9b8;
      --red: #991b1b;
      --red-bg: #fee2e2;
      --gold: #854d0e;
      --gold-bg: #fef9c3;
      --gold-border: #fde047;
      --radius: 10px;
      --radius-lg: 14px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #151412;
        --surface: #1e1c19;
        --surface2: #272420;
        --border: #3a3730;
        --border2: #4a4740;
        --text: #f0ede6;
        --text2: #9b9890;
        --text3: #6b6760;
        --green: #6ee7b7;
        --green-bg: #064e3b;
        --green-border: #065f46;
        --red: #fca5a5;
        --red-bg: #7f1d1d;
        --gold: #fcd34d;
        --gold-bg: #3d2200;
        --gold-border: #78350f;
      }
    }

    body { font-family: 'Georgia', 'Times New Roman', serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 1rem 1.25rem 0; position: sticky; top: 0; z-index: 100;
    }
    .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: .75rem; }
    .logo { width: 32px; height: 32px; background: var(--text); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .logo svg { width: 18px; height: 18px; fill: var(--bg); }
    h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; flex: 1; }

    .sync-badge {
      font-size: 11px; padding: 3px 9px; border-radius: 99px; font-weight: bold;
      white-space: nowrap; border: 1px solid;
    }
    .sync-badge.connected { background: var(--green-bg); color: var(--green); border-color: var(--green-border); }
    .sync-badge.offline   { background: var(--surface2); color: var(--text3); border-color: var(--border); }
    .sync-badge.setup     { background: var(--gold-bg);  color: var(--gold);  border-color: var(--gold-border); }
    .sync-badge.saving    { background: var(--blue-bg, #dbeafe); color: var(--blue, #1e40af); border-color: #93c5fd; }

    .tab-bar { display: flex; overflow-x: auto; scrollbar-width: none; }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab { padding: 10px 14px; font-size: 13px; font-family: 'Georgia', serif; border: none; background: none; cursor: pointer; border-bottom: 2.5px solid transparent; color: var(--text2); white-space: nowrap; transition: color .15s, border-color .15s; }
    .tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: bold; }
    .tab:hover { color: var(--text); }

    .main { max-width: 680px; margin: 0 auto; padding: 1.25rem 1rem; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.125rem; margin-bottom: 1rem; }

    .section-label { font-size: 11px; font-weight: bold; letter-spacing: .08em; text-transform: uppercase; color: var(--text3); margin-bottom: .75rem; }

    label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 4px; }

    input, select { width: 100%; padding: 9px 11px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; font-family: 'Georgia', serif; background: var(--surface); color: var(--text); transition: border-color .15s; -webkit-appearance: none; }
    input:focus, select:focus { outline: none; border-color: var(--border2); }

    .form-row { margin-bottom: .875rem; }

    .btn { padding: 9px 16px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); font-size: 13px; font-family: 'Georgia', serif; cursor: pointer; transition: background .15s; white-space: nowrap; }
    .btn:hover { background: var(--surface2); }
    .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
    .btn-primary:hover { opacity: .85; }
    .btn-danger { color: var(--red); border-color: var(--border); }
    .btn-danger:hover { background: var(--red-bg); }
    .btn-sm { padding: 5px 11px; font-size: 12px; }
    .btn-block { width: 100%; text-align: center; }

    .inline-row { display: flex; gap: 8px; align-items: flex-end; }
    .inline-row > *:first-child { flex: 1; }

    .player-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: .75rem; min-height: 10px; }
    .chip { display: inline-flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 99px; padding: 5px 12px; font-size: 13px; }
    .chip button { border: none; background: none; cursor: pointer; color: var(--text2); font-size: 15px; line-height: 1; padding: 0; }

    /* ── Banners ── */
    .summary-banner { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: .875rem 1rem; margin-bottom: .875rem; }
    .banner-label { font-size: 11px; font-weight: bold; letter-spacing: .08em; text-transform: uppercase; color: var(--text3); margin-bottom: .625rem; }
    .blocks-grid { display: flex; flex-wrap: wrap; gap: 8px; }

    .total-block { flex: 1 1 70px; min-width: 65px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: .5rem .625rem; text-align: center; transition: background .2s, border-color .2s; }
    .total-block.leader { background: var(--green-bg); border-color: var(--green-border); }
    .total-block-name { font-size: 11px; color: var(--text2); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .total-block.leader .total-block-name { color: var(--green); font-weight: bold; }
    .total-block-pts { font-size: 24px; font-weight: bold; line-height: 1; color: var(--text); }
    .total-block.leader .total-block-pts { color: var(--green); }

    .winnings-block { flex: 1 1 70px; min-width: 65px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: .5rem .625rem; text-align: center; transition: background .2s, border-color .2s; }
    .winnings-block.top-earner { background: var(--gold-bg); border-color: var(--gold-border); }
    .winnings-block-name { font-size: 11px; color: var(--text2); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .winnings-block.top-earner .winnings-block-name { color: var(--gold); font-weight: bold; }
    .winnings-block-amount { font-size: 20px; font-weight: bold; line-height: 1; color: var(--text); }
    .winnings-block.top-earner .winnings-block-amount { color: var(--gold); }

    .rate-row { display: flex; align-items: center; justify-content: flex-end; gap: 6px; font-size: 12px; color: var(--text3); }
    .rate-row input { width: 72px; padding: 5px 8px; font-size: 13px; text-align: right; }

    /* ── Scorecard ── */
    .scorecard-wrap { overflow-x: hidden; }
    .scorecard { width: 100%; border-collapse: collapse; font-size: 13px; }
    .scorecard th { padding: 7px 4px; border-bottom: 1px solid var(--border); font-weight: bold; font-size: 11px; letter-spacing: .03em; color: var(--text2); text-align: center; }
    .scorecard th.hole-head { text-align: left; color: var(--text3); }
    .scorecard td { padding: 3px 2px; border-bottom: 1px solid var(--border); text-align: center; vertical-align: middle; }
    .scorecard td.hole-num { font-size: 12px; color: var(--text2); font-weight: bold; text-align: left; padding-left: 4px; width: 38px; }
    .pts-input { width: 48px; padding: 5px 2px; text-align: center; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; font-family: 'Georgia', serif; background: var(--surface); color: var(--text); -webkit-appearance: none; -moz-appearance: textfield; }
    .pts-input::-webkit-inner-spin-button, .pts-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .pts-input:focus { outline: none; border-color: var(--border2); background: var(--surface2); }

    /* ── Round cards ── */
    .round-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.125rem; margin-bottom: .875rem; }
    .round-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: .5rem; }
    .round-title { font-size: 15px; font-weight: bold; }
    .round-players { font-size: 12px; color: var(--text2); margin-bottom: .625rem; }
    .round-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .score-badges { display: flex; flex-wrap: wrap; gap: 5px; }
    .score-badge { font-size: 12px; font-weight: bold; padding: 3px 9px; border-radius: 99px; background: var(--surface2); color: var(--text); }
    .score-badge.leader { background: var(--green-bg); color: var(--green); }

    /* ── History ── */
    .all-time-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.125rem; margin-bottom: 1.25rem; }
    .hist-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .hist-table th { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: bold; letter-spacing: .05em; text-transform: uppercase; color: var(--text3); }
    .hist-table th:not(:first-child) { text-align: right; }
    .hist-table td { padding: 8px; border-bottom: 1px solid var(--border); font-size: 13px; }
    .hist-table td:not(:first-child) { text-align: right; }
    .hist-table tr:last-child td { border-bottom: none; }
    .hist-table tr.top-row td { color: var(--gold); font-weight: bold; }

    .history-round { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 1rem; overflow: hidden; }
    .history-round-header { display: flex; justify-content: space-between; align-items: center; padding: .875rem 1rem; cursor: pointer; user-select: none; }
    .history-round-header:hover { background: var(--surface2); }
    .history-round-date { font-size: 15px; font-weight: bold; }
    .history-round-summary { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .chevron { font-size: 12px; color: var(--text3); transition: transform .2s; }
    .chevron.open { transform: rotate(180deg); }
    .history-round-body { display: none; padding: 0 1rem 1rem; border-top: 1px solid var(--border); }
    .history-round-body.open { display: block; }
    .winner-tag { display: inline-block; font-size: 10px; font-weight: bold; background: var(--gold-bg); color: var(--gold); border: 1px solid var(--gold-border); border-radius: 99px; padding: 1px 6px; margin-left: 5px; vertical-align: middle; }

    .hole-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 3px; margin-top: .5rem; }
    .hole-cell { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 3px 2px; text-align: center; font-size: 11px; }
    .hole-cell .h-num { color: var(--text3); font-size: 10px; }

    /* ── Setup banner ── */
    .setup-banner { background: var(--gold-bg); border: 1px solid var(--gold-border); border-radius: var(--radius-lg); padding: 1rem 1.125rem; margin-bottom: 1rem; }
    .setup-banner h3 { font-size: 14px; font-weight: bold; color: var(--gold); margin-bottom: .5rem; }
    .setup-banner p { font-size: 13px; color: var(--text2); margin-bottom: .375rem; line-height: 1.6; }
    .setup-steps { margin: .5rem 0 0 1.25rem; font-size: 13px; color: var(--text2); line-height: 2; }
    .setup-banner code { font-family: monospace; font-size: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; }

    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text2); font-size: 14px; }
    .empty-icon { font-size: 2.5rem; margin-bottom: .75rem; }
    .hint { font-size: 12px; color: var(--text3); margin-top: .5rem; }
    .player-row { display: flex; justify-content: space-between; align-items: center; padding: .625rem 0; border-bottom: 1px solid var(--border); }
    .player-row:last-child { border-bottom: none; }
    .round-select-row { display: flex; align-items: center; margin-bottom: .875rem; gap: 10px; }
    .round-select-row select { flex: 1; }

    @media (max-width: 480px) {
      .pts-input { width: 42px; font-size: 13px; }
      .scorecard th, .scorecard td { padding-left: 1px; padding-right: 1px; }
      .total-block-pts { font-size: 20px; }
      .winnings-block-amount { font-size: 17px; }
      .hole-grid { grid-template-columns: repeat(6, 1fr); }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="5" r="3"/>
        <path d="M12 8 Q7 12 8 18 H16 Q17 12 12 8Z"/>
        <rect x="11" y="18" width="2" height="4" rx="1"/>
      </svg>
    </div>
    <h1>Wolf Points Tracker</h1>
    <span class="sync-badge setup" id="sync-badge">⚙ Setup</span>
  </div>
  <nav class="tab-bar">
    <button class="tab active" onclick="showTab('rounds')"    id="tab-rounds">Rounds</button>
    <button class="tab"        onclick="showTab('new-round')" id="tab-new-round">New Round</button>
    <button class="tab"        onclick="showTab('scorecard')" id="tab-scorecard">Scorecard</button>
    <button class="tab"        onclick="showTab('history')"   id="tab-history">History</button>
    <button class="tab"        onclick="showTab('players')"   id="tab-players">Players</button>
  </nav>
</header>

<main class="main">
  <div id="view-rounds"></div>
  <div id="view-new-round" style="display:none"></div>
  <div id="view-scorecard" style="display:none"></div>
  <div id="view-history"   style="display:none"></div>
  <div id="view-players"   style="display:none"></div>
</main>

<script>
// ═══════════════════════════════════════════════════════════════
// 🔧  PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE
//     Leave blank to run in local-only mode.
// ═══════════════════════════════════════════════════════════════
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyl-88yQNd0adeI5VpCcfkLcSvhN5WwC_5oTKwylsniW0eQVNmAmAfxMsNYsRKMWbQ/exec";
// ═══════════════════════════════════════════════════════════════

const DEFAULT_RATE = 0.25;

let state = {
  players:      [],
  rounds:       [],
  currentRound: null,
  activeTab:    'rounds',
  pointRate:    DEFAULT_RATE,
  gsConnected:  false
};
let newRoundPlayers = [];
let debounceTimers  = {};

// ── Local storage ────────────────────────────────────────────
function localSave() {
  try { localStorage.setItem('wolf_golf', JSON.stringify(state)); } catch(e) {}
}
function localLoad() {
  try {
    const s = JSON.parse(localStorage.getItem('wolf_golf') || '{}');
    state.players   = s.players   || [];
    state.rounds    = s.rounds    || [];
    state.pointRate = s.pointRate ?? DEFAULT_RATE;
  } catch(e) {}
}

// ── Google Sheets helpers ─────────────────────────────────────
function gsConfigured() { return APPS_SCRIPT_URL && APPS_SCRIPT_URL.startsWith('https://'); }

async function gsPost(payload) {
  if (!gsConfigured()) return null;
  try {
    const r = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },   // avoid CORS preflight
      body: JSON.stringify(payload)
    });
    return await r.json();
  } catch(e) { console.error('GS post error:', e); return null; }
}

async function gsGet(action) {
  if (!gsConfigured()) return null;
  try {
    const r = await fetch(`${APPS_SCRIPT_URL}?action=${action}`);
    return await r.json();
  } catch(e) { console.error('GS get error:', e); return null; }
}

async function gsLoadAll() {
  const data = await gsGet('loadAll');
  if (!data || data.error) return null;
  return data;
}

async function gsSaveRound(round) {
  return await gsPost({ action: 'saveRound', round });
}

async function gsDeleteRound(id) {
  return await gsPost({ action: 'deleteRound', id });
}

async function gsSaveMeta(players, pointRate) {
  return await gsPost({ action: 'saveMeta', players, pointRate });
}

// ── Badge helper ─────────────────────────────────────────────
function setBadge(text, cls) {
  const b = document.getElementById('sync-badge');
  b.textContent = text;
  b.className = 'sync-badge ' + cls;
}

// ── Init ─────────────────────────────────────────────────────
async function init() {
  localLoad();

  if (!gsConfigured()) {
    setBadge('⚙ Setup needed', 'setup');
    render();
    return;
  }

  setBadge('↻ Loading…', 'offline');
  const data = await gsLoadAll();
  if (data) {
    state.rounds    = data.rounds    || [];
    state.players   = data.players   || [];
    state.pointRate = data.pointRate ?? DEFAULT_RATE;
    localSave();
    state.gsConnected = true;
    setBadge('📊 Sheets', 'connected');
  } else {
    setBadge('📱 Local only', 'offline');
  }
  render();
}

// ── Save helpers ─────────────────────────────────────────────
async function saveRound(round) {
  localSave();
  if (state.gsConnected) {
    setBadge('↑ Saving…', 'saving');
    await gsSaveRound(round);
    setBadge('📊 Sheets', 'connected');
  }
}

async function saveMeta() {
  localSave();
  if (state.gsConnected) await gsSaveMeta(state.players, state.pointRate);
}

// ── Tab routing ──────────────────────────────────────────────
function showTab(tab) {
  ['rounds','new-round','scorecard','history','players'].forEach(t => {
    document.getElementById('view-'+t).style.display = 'none';
    document.getElementById('tab-'+t).classList.remove('active');
  });
  document.getElementById('view-'+tab).style.display = 'block';
  document.getElementById('tab-'+tab).classList.add('active');
  state.activeTab = tab;
  renderTab(tab);
}
function render() { renderTab(state.activeTab); }
function renderTab(tab) {
  if (tab==='rounds')    renderRounds();
  if (tab==='new-round') renderNewRound();
  if (tab==='scorecard') renderScorecard();
  if (tab==='history')   renderHistory();
  if (tab==='players')   renderPlayers();
}

// ── Helpers ──────────────────────────────────────────────────
function today() { return new Date().toISOString().slice(0,10); }
function formatDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]+' '+parseInt(day)+', '+y;
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function safeId(rid,name) { return rid+'-'+String(name).replace(/[^a-z0-9]/gi,'_'); }
function calcTotals(round) {
  const t={};
  (round.players||[]).forEach(p=>{
    t[p]=0;
    for(let h=1;h<=18;h++) t[p]+=Number(round.scores?.[p]?.[h]||0);
  });
  return t;
}
function fmtMoney(n) { return '$'+n.toFixed(2); }

// ── Setup banner ─────────────────────────────────────────────
function setupBanner() {
  if (gsConfigured()) return '';
  return `<div class="setup-banner">
    <h3>📊 Connect Google Sheets to save your data</h3>
    <p>Data currently saves to this browser only. Follow the setup guide (<code>SHEETS_SETUP.md</code>) to enable cloud sync, then paste your Web App URL into <code>index.html</code>.</p>
  </div>`;
}

// ── Rounds ───────────────────────────────────────────────────
function renderRounds() {
  const el = document.getElementById('view-rounds');
  const sorted = [...state.rounds].sort((a,b)=>new Date(b.date)-new Date(a.date));
  if (!sorted.length) {
    el.innerHTML = setupBanner()+`<div class="empty-state"><div class="empty-icon">⛳</div><div>No rounds yet.</div><div style="margin-top:.5rem">Hit <strong>New Round</strong> to get started.</div></div>`;
    return;
  }
  el.innerHTML = setupBanner()+sorted.map(r=>{
    const t=calcTotals(r), maxP=Math.max(0,...Object.values(t));
    return `<div class="round-card">
      <div class="round-header">
        <div class="round-title">${formatDate(r.date)}</div>
        <div class="round-actions">
          <button class="btn btn-sm" onclick="openRound('${r.id}')">Edit</button>
          <button class="btn btn-sm btn-danger" onclick="deleteRound('${r.id}')">Delete</button>
        </div>
      </div>
      <div class="round-players">Players: ${(r.players||[]).map(esc).join(' · ')}</div>
      <div class="score-badges">
        ${(r.players||[]).map(p=>`<span class="score-badge${t[p]===maxP&&maxP>0?' leader':''}">${esc(p)}: ${t[p]} pts · ${fmtMoney(t[p]*state.pointRate)}</span>`).join('')}
      </div>
    </div>`;
  }).join('');
}

async function deleteRound(id) {
  if (!confirm('Delete this round? This cannot be undone.')) return;
  state.rounds = state.rounds.filter(r=>r.id!==id);
  if (state.currentRound===id) state.currentRound=null;
  localSave();
  if (state.gsConnected) await gsDeleteRound(id);
  render();
}
function openRound(id) { state.currentRound=id; showTab('scorecard'); }

// ── New Round ────────────────────────────────────────────────
function renderNewRound() {
  document.getElementById('view-new-round').innerHTML=`
    <div class="card">
      <div class="section-label">Round details</div>
      <div class="form-row"><label>Date</label><input id="nr-date" type="date" value="${today()}" /></div>
    </div>
    <div class="card">
      <div class="section-label">Players</div>
      <div class="player-chips">${newRoundPlayers.map(p=>`<span class="chip">${esc(p)}<button onclick="removeNRP('${esc(p)}')">×</button></span>`).join('')}</div>
      <div class="inline-row">
        <div>
          <input id="nr-pi" placeholder="Player name" list="nrpl" autocomplete="off"
            onkeydown="if(event.key==='Enter'){event.preventDefault();addNRP()}" />
          <datalist id="nrpl">${state.players.map(p=>`<option value="${esc(p)}">`).join('')}</datalist>
        </div>
        <button class="btn" onclick="addNRP()">Add</button>
      </div>
      <p class="hint">Saved players appear as suggestions.</p>
    </div>
    <button class="btn btn-primary btn-block" onclick="createRound()">Start Round ›</button>`;
}
function removeNRP(name) { newRoundPlayers=newRoundPlayers.filter(p=>p!==name); renderNewRound(); }
function addNRP() {
  const inp=document.getElementById('nr-pi'), name=inp.value.trim();
  if (!name||newRoundPlayers.includes(name)){inp.value='';return;}
  newRoundPlayers.push(name);
  if (!state.players.includes(name)){state.players.push(name); saveMeta();}
  inp.value=''; renderNewRound();
  setTimeout(()=>document.getElementById('nr-pi')?.focus(),50);
}
async function createRound() {
  const date=document.getElementById('nr-date').value||today();
  if (!newRoundPlayers.length){alert('Add at least one player.');return;}
  const id='r'+Date.now(), scores={};
  newRoundPlayers.forEach(p=>scores[p]={});
  const round={id,date,players:[...newRoundPlayers],scores};
  state.rounds.push(round);
  state.currentRound=id;
  newRoundPlayers=[];
  await saveRound(round);
  showTab('scorecard');
}

// ── Scorecard ────────────────────────────────────────────────
function renderScorecard() {
  const el=document.getElementById('view-scorecard');
  if (!state.rounds.length){el.innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div><div>No rounds yet.</div></div>`;return;}
  if (!state.currentRound||!state.rounds.find(r=>r.id===state.currentRound))
    state.currentRound=state.rounds.slice().sort((a,b)=>new Date(b.date)-new Date(a.date))[0].id;

  const round=state.rounds.find(r=>r.id===state.currentRound);
  const players=round.players||[];
  const totals=calcTotals(round);
  const maxP=Math.max(0,...Object.values(totals));
  const rate=state.pointRate;
  const maxW=Math.max(0,...players.map(p=>totals[p]*rate));

  const totHtml=players.map(p=>{
    const ldr=totals[p]===maxP&&maxP>0;
    return `<div class="total-block${ldr?' leader':''}" id="tot-${safeId(round.id,p)}">
      <div class="total-block-name">${esc(p)}</div>
      <div class="total-block-pts">${totals[p]}</div>
    </div>`;
  }).join('');

  const winHtml=players.map(p=>{
    const amt=totals[p]*rate, top=amt===maxW&&maxW>0;
    return `<div class="winnings-block${top?' top-earner':''}" id="win-${safeId(round.id,p)}">
      <div class="winnings-block-name">${esc(p)}</div>
      <div class="winnings-block-amount">${fmtMoney(amt)}</div>
    </div>`;
  }).join('');

  let rows='';
  for(let h=1;h<=18;h++){
    rows+=`<tr><td class="hole-num">${h}</td>${players.map(p=>{
      const v=round.scores?.[p]?.[h]??'';
      return `<td><input class="pts-input" type="number" inputmode="numeric" min="0" max="99"
        value="${v}" placeholder="—"
        oninput="liveScore('${round.id}','${p}',${h},this.value)"/></td>`;
    }).join('')}</tr>`;
  }

  const hw=38, cw=Math.max(50,Math.floor((Math.min(window.innerWidth,680)-hw-32)/players.length));

  el.innerHTML=`
    <div class="round-select-row">
      <select onchange="switchRound(this.value)">
        ${state.rounds.slice().sort((a,b)=>new Date(b.date)-new Date(a.date))
          .map(r=>`<option value="${r.id}"${r.id===state.currentRound?' selected':''}>${formatDate(r.date)}</option>`).join('')}
      </select>
    </div>
    <div class="summary-banner">
      <div class="banner-label">Running Totals</div>
      <div class="blocks-grid">${totHtml}</div>
    </div>
    <div class="summary-banner">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.625rem">
        <div class="banner-label" style="margin-bottom:0">Winnings</div>
        <div class="rate-row">
          <span>$ per point:</span>
          <input type="number" min="0.01" step="0.01" value="${rate.toFixed(2)}" onchange="updateRate(this.value)"/>
        </div>
      </div>
      <div class="blocks-grid">${winHtml}</div>
    </div>
    <div class="scorecard-wrap">
      <table class="scorecard">
        <thead><tr>
          <th class="hole-head" style="width:${hw}px">Hole</th>
          ${players.map(p=>`<th style="width:${cw}px">${esc(p)}</th>`).join('')}
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <p class="hint" style="margin-top:.625rem">Enter points per hole — totals and winnings update instantly.</p>`;
}

function liveScore(rid,player,hole,val) {
  const round=state.rounds.find(r=>r.id===rid); if(!round) return;
  if(!round.scores[player]) round.scores[player]={};
  round.scores[player][hole]=val===''?'':Number(val);
  localSave();
  clearTimeout(debounceTimers[rid]);
  debounceTimers[rid]=setTimeout(()=>saveRound(round),1000);
  const t=calcTotals(round), maxP=Math.max(0,...Object.values(t));
  round.players.forEach(p=>{
    const el=document.getElementById('tot-'+safeId(rid,p)); if(!el) return;
    const ldr=t[p]===maxP&&maxP>0;
    el.className='total-block'+(ldr?' leader':'');
    el.querySelector('.total-block-pts').textContent=t[p];
  });
  refreshWin(round);
}
function refreshWin(round) {
  const t=calcTotals(round),rate=state.pointRate;
  const maxW=Math.max(0,...round.players.map(p=>t[p]*rate));
  round.players.forEach(p=>{
    const el=document.getElementById('win-'+safeId(round.id,p)); if(!el) return;
    const amt=t[p]*rate, top=amt===maxW&&maxW>0;
    el.className='winnings-block'+(top?' top-earner':'');
    el.querySelector('.winnings-block-amount').textContent=fmtMoney(amt);
  });
}
async function updateRate(val) {
  const n=parseFloat(val); if(isNaN(n)||n<=0) return;
  state.pointRate=n; await saveMeta();
  const round=state.rounds.find(r=>r.id===state.currentRound);
  if(round) refreshWin(round);
}
function switchRound(id){state.currentRound=id;renderScorecard();}

// ── History ──────────────────────────────────────────────────
function renderHistory() {
  const el=document.getElementById('view-history');
  if (!state.rounds.length){
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">📖</div><div>No rounds in history yet.</div></div>`;
    return;
  }
  const rate=state.pointRate;
  const sorted=[...state.rounds].sort((a,b)=>new Date(b.date)-new Date(a.date));

  // All-time
  const allP=[...new Set(sorted.flatMap(r=>r.players||[]))];
  const lifePts={}, lifeRounds={};
  allP.forEach(p=>{lifePts[p]=0;lifeRounds[p]=0;});
  sorted.forEach(r=>{
    const t=calcTotals(r);
    (r.players||[]).forEach(p=>{lifePts[p]=(lifePts[p]||0)+t[p];lifeRounds[p]=(lifeRounds[p]||0)+1;});
  });
  const lifeSorted=allP.slice().sort((a,b)=>lifePts[b]-lifePts[a]);
  const topPts=lifePts[lifeSorted[0]]||0;

  const allTimeHtml=`<div class="all-time-card">
    <div class="section-label">All-Time Leaderboard</div>
    <table class="hist-table">
      <thead><tr><th>Player</th><th>Rounds</th><th>Total Pts</th><th>Winnings</th></tr></thead>
      <tbody>${lifeSorted.map(p=>{
        const top=lifePts[p]===topPts&&topPts>0;
        return `<tr class="${top?'top-row':''}">
          <td>${esc(p)}${top?'<span class="winner-tag">🏆 Leader</span>':''}</td>
          <td>${lifeRounds[p]}</td>
          <td>${lifePts[p]}</td>
          <td>${fmtMoney(lifePts[p]*rate)}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>
  </div>`;

  const roundsHtml=sorted.map((r,i)=>{
    const t=calcTotals(r);
    const ps=(r.players||[]).slice().sort((a,b)=>t[b]-t[a]);
    const maxP=Math.max(0,...Object.values(t));
    const pot=ps.reduce((s,p)=>s+t[p]*rate,0);
    const winner=ps[0]&&t[ps[0]]===maxP&&maxP>0?ps[0]:null;

    const playerRows=ps.map(p=>{
      const isW=t[p]===maxP&&maxP>0;
      return `<tr class="${isW?'top-row':''}">
        <td>${esc(p)}${isW?'<span class="winner-tag">Winner</span>':''}</td>
        <td>${t[p]}</td>
        <td>${fmtMoney(t[p]*rate)}</td>
      </tr>`;
    }).join('');

    const holeGrids=ps.map(p=>`
      <div style="margin-top:.875rem">
        <div style="font-size:11px;font-weight:bold;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">${esc(p)}</div>
        <div class="hole-grid">
          ${Array.from({length:18},(_,j)=>j+1).map(h=>`
            <div class="hole-cell">
              <div class="h-num">${h}</div>
              <div>${r.scores?.[p]?.[h]??'—'}</div>
            </div>`).join('')}
        </div>
      </div>`).join('');

    return `<div class="history-round">
      <div class="history-round-header" onclick="toggleHist('hb-${i}','hc-${i}')">
        <div>
          <div class="history-round-date">${formatDate(r.date)}</div>
          <div class="history-round-summary">${ps.length} players · Pot: ${fmtMoney(pot)}${winner?' · Winner: '+esc(winner):''}</div>
        </div>
        <div class="chevron" id="hc-${i}">▼</div>
      </div>
      <div class="history-round-body" id="hb-${i}">
        <table class="hist-table" style="margin-top:.875rem">
          <thead><tr><th>Player</th><th>Points</th><th>Winnings</th></tr></thead>
          <tbody>${playerRows}</tbody>
        </table>
        <div style="margin-top:.5rem">
          <div class="banner-label" style="margin-top:.75rem">Hole-by-Hole</div>
          ${holeGrids}
        </div>
      </div>
    </div>`;
  }).join('');

  el.innerHTML=allTimeHtml+`<div class="section-label" style="margin-bottom:.625rem">Round History</div>`+roundsHtml;
}

function toggleHist(bodyId, chevId) {
  const b=document.getElementById(bodyId), c=document.getElementById(chevId);
  if(!b) return;
  b.classList.toggle('open'); c.classList.toggle('open');
}

// ── Players ──────────────────────────────────────────────────
function renderPlayers() {
  document.getElementById('view-players').innerHTML=`
    <div class="card">
      <div class="section-label">Saved players (${state.players.length})</div>
      ${state.players.length
        ? state.players.map(p=>`<div class="player-row"><span>${esc(p)}</span><button class="btn btn-sm btn-danger" onclick="deletePlayer('${esc(p)}')">Remove</button></div>`).join('')
        : `<div style="font-size:14px;color:var(--text2);padding:.25rem 0">No saved players yet.</div>`}
    </div>
    <div class="card">
      <div class="section-label">Add player</div>
      <div class="inline-row">
        <div><input id="npi" placeholder="Player name" onkeydown="if(event.key==='Enter'){event.preventDefault();addPlayer()}" /></div>
        <button class="btn" onclick="addPlayer()">Add</button>
      </div>
    </div>`;
}
async function addPlayer() {
  const inp=document.getElementById('npi'), name=inp.value.trim();
  if (!name||state.players.includes(name)){inp.value='';return;}
  state.players.push(name); inp.value='';
  await saveMeta(); renderPlayers();
}
async function deletePlayer(name) {
  state.players=state.players.filter(p=>p!==name);
  await saveMeta(); renderPlayers();
}

init();
</script>
</body>
</html>
